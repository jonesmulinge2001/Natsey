<footer class="relative bg-gray-900 text-white py-16 px-6 overflow-hidden">
    <!-- Glowing background effect -->
    <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-[120%] h-[120%] bg-gradient-to-r from-blue-600 via-purple-600 to-pink-500 opacity-20 blur-3xl -z-10"></div>
  
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
      <!-- Company Info -->
      <div class="space-y-4">
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">{{companyInfo.name}}</h2>
        <p class="text-gray-300 text-sm">{{companyInfo.description}}</p>
        <p class="text-gray-400 text-sm">Email: <a href="mailto:{{companyInfo.email}}" class="hover:text-blue-400">{{companyInfo.email}}</a></p>
        <p class="text-gray-400 text-sm">Phone: {{companyInfo.phone}}</p>
      </div>
  
      <!-- Quick Links -->
      <div>
        <h3 class="text-lg font-semibold text-white mb-4">Quick Links</h3>
        <ul class="space-y-2">
          <li *ngFor="let link of quickLinks">
            <a [routerLink]="link.path" class="text-gray-300 hover:text-blue-400 transition-colors">{{link.name}}</a>
          </li>
        </ul>
      </div>
  
      <!-- Services -->
      <div>
        <h3 class="text-lg font-semibold text-white mb-4">Services</h3>
        <ul class="space-y-2">
          <li *ngFor="let service of services">
            <a [routerLink]="service.path" class="text-gray-300 hover:text-purple-400 transition-colors">{{service.name}}</a>
          </li>
        </ul>
      </div>
  
      <!-- Newsletter & Social -->
      <div class="space-y-4">
        <h3 class="text-lg font-semibold text-white mb-2">Subscribe to our Newsletter</h3>
        <form (ngSubmit)="subscribeNewsletter()" class="flex flex-col sm:flex-row gap-2">
          <input type="email" [(ngModel)]="newsletterEmail" name="email" placeholder="Your email"
                 class="flex-1 px-3 py-2 rounded-lg text-gray-900 focus:outline-none" required>
          <button type="submit" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 rounded-lg font-semibold transition-all">
            Subscribe
          </button>
        </form>
  
        <!-- Social Icons -->
        <div class="flex gap-4 mt-4">
          <a *ngFor="let social of socialLinks" [href]="social.url" target="_blank"
             class="text-white text-xl hover:scale-110 transform transition-transform {{social.color}}">
            {{ getSocialIcon(social.icon) }}
          </a>
        </div>
      </div>
    </div>
  
    <!-- Footer bottom -->
    <div class="mt-12 border-t border-gray-700 pt-6 text-center text-gray-400 text-sm">
      &copy; {{currentYear}} {{companyInfo.name}}. All rights reserved.
    </div>
  </footer>
