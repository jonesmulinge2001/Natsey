<section id="projects" class="projects-section py-20 bg-gradient-to-b from-gray-50 to-white overflow-hidden">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- Section Header -->
      <div class="text-center mb-16 section-header">
        <div class="inline-block mb-4">
          <span class="inline-flex items-center px-4 py-2 rounded-full bg-gradient-to-r from-blue-100 to-purple-100">
            <span class="material-icons text-blue-600 text-sm mr-2">rocket_launch</span>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 font-semibold">
              Portfolio Highlights
            </span>
          </span>
        </div>
        <h2 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 animate-fade-in">
          Featured Projects
        </h2>
        <div class="w-24 h-1 bg-gradient-to-r from-blue-600 to-purple-600 mx-auto mb-6 rounded-full animate-scale"></div>
        <p class="text-xl text-gray-600 max-w-3xl mx-auto mb-10 animate-fade-in-up">
          Real-world applications solving complex problems with elegant solutions
        </p>
        
        <!-- Category Filters -->
        <div class="flex flex-wrap justify-center gap-3 mb-12 filter-container">
          <button *ngFor="let category of categories" 
                  [class.active-filter]="selectedCategory === category"
                  (click)="filterProjects(category)"
                  class="filter-btn px-6 py-2 rounded-full font-medium transition-all duration-300 transform hover:scale-105">
            {{category}}
          </button>
        </div>
      </div>
  
      <!-- Projects Grid -->
      <div class="projects-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
        <div *ngFor="let project of filteredProjects; let i = index" 
             class="project-card group bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-3"
             [style.animation-delay]="(i * 0.1) + 's'">
          
          <!-- Project Image Container -->
          <div class="relative h-64 overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-purple-600 opacity-0 group-hover:opacity-20 transition-opacity duration-500 z-10"></div>
            <img 
              [src]="project.image" 
              [alt]="project.title"
              class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-out">
            
            <!-- Category Badge -->
            <div class="absolute top-4 right-4 z-20">
              <span class="px-3 py-1 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-semibold rounded-full shadow-lg">
                {{project.category}}
              </span>
            </div>
            
            <!-- Overlay on Hover -->
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10"></div>
          </div>
          
          <!-- Project Content -->
          <div class="p-6 relative">
            <h3 class="text-2xl font-bold mb-3 text-gray-800 group-hover:text-blue-600 transition-colors duration-300">
              {{project.title}}
            </h3>
            <p class="text-gray-600 mb-4 leading-relaxed">{{project.description}}</p>
            
            <!-- Technologies -->
            <div class="flex flex-wrap gap-2 mb-6">
              <span *ngFor="let tech of project.technologies" 
                    class="tech-badge px-3 py-1 bg-gradient-to-r from-blue-50 to-purple-50 text-blue-600 rounded-full text-sm font-medium transition-all duration-300 hover:scale-105 cursor-default">
                {{tech}}
              </span>
            </div>
            
            <!-- Links -->
            <div class="flex gap-3">
              <a *ngIf="project.liveUrl" 
                 [href]="project.liveUrl" 
                 target="_blank"
                 rel="noopener noreferrer"
                 class="live-demo-btn flex-1 text-center px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold transition-all duration-300 transform hover:-translate-y-0.5 hover:shadow-lg flex items-center justify-center gap-2">
                <span class="material-icons text-sm">open_in_new</span>
                Live Demo
              </a>
              <a [href]="project.githubUrl" 
                 target="_blank"
                 rel="noopener noreferrer"
                 class="github-btn flex-1 text-center px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg font-semibold hover:border-gray-800 hover:bg-gray-800 hover:text-white transition-all duration-300 flex items-center justify-center gap-2">
                <span class="material-icons text-sm">code</span>
                GitHub
              </a>
            </div>
          </div>
        </div>
      </div>
  
      <!-- View All Projects CTA -->
      <div class="text-center">
        <button class="view-all-btn group relative px-8 py-3 rounded-lg font-semibold transition-all duration-300 overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-purple-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          <div class="absolute inset-0 border-2 border-blue-600 rounded-lg group-hover:border-transparent transition-all duration-300"></div>
          <span class="relative text-blue-600 group-hover:text-white transition-colors duration-300 flex items-center justify-center gap-2">
            View All Projects
            <span class="material-icons text-sm transform group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
          </span>
        </button>
      </div>
    </div>
  </section>
