<!-- Navbar Container -->
<div class="w-full">
    <nav 
      class="fixed top-0 left-0 w-full z-50 transition-all duration-500 ease-out"
      [ngClass]="isScrolled ? 'bg-white/95 backdrop-blur-md shadow-lg border-b border-gray-100' : 'bg-gradient-to-r from-blue-50/90 to-indigo-50/90 backdrop-blur-sm'">
  
      <!-- Inner Container -->
      <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 flex items-center justify-between h-16 lg:h-20">
  
        <!-- Logo Section with Classic Animation -->
        <div>
          <a 
            [routerLink]="['/']" 
            (click)="scrollToTop()"
            class="flex items-center gap-3 group cursor-pointer">
            
            <!-- Classic Emblem Style Logo -->
            <div class="relative">
              <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl blur-md opacity-0 group-hover:opacity-50 transition-opacity duration-500"></div>
              <div class="w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 via-blue-600 to-indigo-600 text-white font-bold text-lg shadow-md group-hover:shadow-xl transition-all duration-300 group-hover:scale-105">
                JM
              </div>
            </div>
  
            <div class="hidden sm:flex flex-col leading-tight">
              <span class="font-semibold text-gray-800 group-hover:text-blue-600 transition-colors duration-300 text-base lg:text-lg">Jonathan Mulinge</span>
              <span class="text-xs text-gray-500 tracking-wide">Software Engineer</span>
            </div>
          </a>
        </div>
  
        <!-- Desktop Navigation with Classic Underline Effect -->
        <div class="hidden md:flex items-center gap-1 lg:gap-2">
  
          <ng-container *ngFor="let item of navItems">
            <a 
              *ngIf="!item.isExternal" 
              [routerLink]="['/', item.path]"
              [fragment]="item.fragment"
              (click)="handleNavigation(item)"
              routerLinkActive="active-nav-link"
              class="nav-link-item relative px-3 lg:px-4 py-2 text-gray-600 hover:text-blue-600 transition-all duration-300 font-medium text-sm lg:text-base group">
  
              <span class="material-icons text-base mr-1.5 align-middle group-hover:scale-110 transition-transform duration-300 inline-block">{{item.icon}}</span>
              <span class="align-middle">{{item.name}}</span>
              
              <!-- Classic Underline Animation -->
              <span class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-0 h-0.5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full group-hover:w-5/12 transition-all duration-300"></span>
            </a>
  
            <a 
              *ngIf="item.isExternal" 
              [href]="item.path"
              target="_blank"
              rel="noopener noreferrer"
              class="nav-link-item relative px-3 lg:px-4 py-2 text-gray-600 hover:text-blue-600 transition-all duration-300 font-medium text-sm lg:text-base group">
  
              <span class="material-icons text-base mr-1.5 align-middle group-hover:scale-110 transition-transform duration-300 inline-block">{{item.icon}}</span>
              <span class="align-middle">{{item.name}}</span>
              <span class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-0 h-0.5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full group-hover:w-5/12 transition-all duration-300"></span>
            </a>
          </ng-container>
  
          <!-- Classic CTA Button with Elegant Hover -->
          <a 
            routerLink="/" 
            fragment="contact"
            class="cta-classic ml-2 lg:ml-4 relative group overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            <div class="relative flex items-center gap-2 px-5 lg:px-6 py-2 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold text-sm shadow-md group-hover:shadow-lg transition-all duration-300 group-hover:-translate-y-0.5">
              <span class="material-icons text-base group-hover:rotate-12 transition-transform duration-300">rocket_launch</span>
              <span>Hire Me</span>
            </div>
          </a>
        </div>
  
        <!-- Classic Mobile Menu Button -->
        <button 
          (click)="toggleMobileMenu()" 
          class="md:hidden relative w-10 h-10 rounded-lg hover:bg-gray-100/80 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.bg-gray-100]="isMobileMenuOpen">
  
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="material-icons text-gray-700 transition-all duration-300" 
                  [class.rotate-90]="isMobileMenuOpen">
              {{isMobileMenuOpen ? 'close' : 'menu'}}
            </span>
          </div>
        </button>
      </div>
  
      <!-- Classic Mobile Menu Panel with Elegant Animation -->
      <div 
        *ngIf="isMobileMenuOpen" 
        class="md:hidden bg-white/95 backdrop-blur-md shadow-xl border-t border-gray-100">
  
        <div class="flex flex-col px-5 py-5 space-y-1">
  
          <ng-container *ngFor="let item of navItems; let i = index">
            <a 
              *ngIf="!item.isExternal" 
              [routerLink]="['/', item.path]"
              [fragment]="item.fragment"
              (click)="closeMobileMenu()"
              routerLinkActive="mobile-active-link"
              class="mobile-nav-item flex items-center justify-between px-4 py-3 rounded-lg text-gray-700 hover:text-blue-600 hover:bg-blue-50/50 transition-all duration-300 group"
              [style.animation-delay]="(i * 0.05) + 's'">
  
              <div class="flex items-center gap-3">
                <span class="material-icons text-base text-gray-500 group-hover:text-blue-600 transition-colors">{{item.icon}}</span>
                <span class="font-medium">{{item.name}}</span>
              </div>
  
              <span class="material-icons text-sm text-gray-400 group-hover:text-blue-600 group-hover:translate-x-1 transition-all duration-300">arrow_forward</span>
            </a>
  
            <a 
              *ngIf="item.isExternal" 
              [href]="item.path"
              target="_blank"
              rel="noopener noreferrer"
              (click)="closeMobileMenu()"
              class="mobile-nav-item flex items-center justify-between px-4 py-3 rounded-lg text-gray-700 hover:text-blue-600 hover:bg-blue-50/50 transition-all duration-300 group"
              [style.animation-delay]="(i * 0.05) + 's'">
  
              <div class="flex items-center gap-3">
                <span class="material-icons text-base text-gray-500 group-hover:text-blue-600 transition-colors">{{item.icon}}</span>
                <span class="font-medium">{{item.name}}</span>
              </div>
  
              <span class="material-icons text-sm text-gray-400 group-hover:text-blue-600 group-hover:translate-x-1 transition-all duration-300">open_in_new</span>
            </a>
          </ng-container>
  
          <!-- Classic Mobile CTA with Elegant Design -->
          <div class="pt-4 mt-2 border-t border-gray-100">
            <a 
              routerLink="/" 
              fragment="contact"
              (click)="closeMobileMenu()"
              class="flex items-center justify-center gap-2 w-full px-5 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 group">
              <span class="material-icons text-base group-hover:rotate-12 transition-transform duration-300">chat</span>
              <span>Let's Talk</span>
            </a>
          </div>
        </div>
      </div>
    </nav>
  
    <!-- Classic Spacer -->
    <div class="h-16 lg:h-20"></div>
  </div>
  
  <style>
    /* Classic Active Link Styles */
    .active-nav-link {
      color: #2563eb !important;
      font-weight: 600 !important;
      position: relative;
    }
    
    .active-nav-link::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 42%;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 2px;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        width: 0;
        opacity: 0;
      }
      to {
        width: 42%;
        opacity: 1;
      }
    }
    
    /* Classic Mobile Active Link */
    .mobile-active-link {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(99, 102, 241, 0.08) 100%);
      color: #2563eb !important;
    }
    
    .mobile-active-link .material-icons {
      color: #2563eb !important;
    }
    
    /* Classic Animation for Mobile Items */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .mobile-nav-item {
      animation: fadeSlideIn 0.3s ease-out forwards;
      opacity: 0;
    }
    
    /* Classic Hover Effects */
    .nav-link-item {
      position: relative;
      isolation: isolate;
    }
    
    .nav-link-item:hover .material-icons {
      transform: scale(1.1);
      transition: transform 0.2s ease;
    }
    
    /* Classic Button Ripple Effect */
    .cta-classic {
      position: relative;
      overflow: hidden;
    }
    
    .cta-classic:active::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple 0.6s ease-out;
    }
    
    @keyframes ripple {
      to {
        transform: translate(-50%, -50%) scale(4);
        opacity: 0;
      }
    }
    
    /* Classic Scroll Progress Indicator */
    .navbar-scrolled::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #6366f1, #3b82f6);
      animation: scrollProgress linear;
      animation-timeline: scroll();
    }
    
    @keyframes scrollProgress {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }
    
    /* Classic Reduced Motion Support */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    /* Classic Smooth Scrolling */
    html {
      scroll-behavior: smooth;
    }
  </style>
